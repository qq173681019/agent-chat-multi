<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🤖 Multi-Agent Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --surface: #151515; --surface2: #1e1e1e; --surface3: #2a2a2a;
  --primary: #6c5ce7; --primary-light: #a29bfe;
  --text: #e8e8e8; --text-dim: #888; --text-muted: #555;
  --border: #2a2a2a;
  --success: #00b894; --warning: #fdcb6e; --danger: #e74c3c;
}
body { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; }

/* ===== Header ===== */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  min-height: 52px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.header-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 1px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.agents-strip { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.agent-chip {
  display: flex; align-items: center; gap: 3px;
  padding: 2px 8px 2px 4px; border-radius: 12px;
  font-size: 11px; background: var(--surface2);
  transition: all 0.2s;
}
.agent-chip .avatar { font-size: 14px; }
.agent-chip .dot { width: 5px; height: 5px; border-radius: 50%; }
.agent-chip.online .dot { background: var(--success); box-shadow: 0 0 4px var(--success); }
.agent-chip.offline .dot { background: var(--text-muted); }
.header-actions { display: flex; gap: 6px; align-items: center; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text-dim); font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--surface3); color: var(--text); border-color: #444; }

/* ===== Typing Bar ===== */
.typing-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px; min-height: 0; max-height: 28px;
  overflow: hidden; transition: all 0.2s;
  font-size: 12px; color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
}
.typing-bar.active { padding: 4px 16px; min-height: 28px; }
.typing-dots { display: inline-flex; gap: 3px; }
.typing-dots span { width: 4px; height: 4px; border-radius: 50%; background: var(--text-dim); animation: typingBounce 1.4s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

/* ===== Messages ===== */
.messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

.msg { max-width: 82%; position: relative; animation: msgIn 0.25s ease-out; }
.msg.user { align-self: flex-end; }
.msg.agent { align-self: flex-start; }
.msg.system { align-self: center; max-width: 100%; }

.msg-header { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; padding: 0 4px; }
.msg-avatar { font-size: 15px; }
.msg-name { font-size: 11px; font-weight: 600; }
.msg-time { font-size: 10px; color: var(--text-muted); margin-left: auto; }

.msg-bubble {
  padding: 9px 13px; border-radius: 16px;
  font-size: 14px; line-height: 1.55; word-break: break-word;
  position: relative;
}
.msg.user .msg-bubble { background: var(--primary); border-bottom-right-radius: 4px; color: #fff; }
.msg.user .msg-name { color: #fff; opacity: 0.8; }
.msg.agent .msg-bubble { background: var(--surface2); border-bottom-left-radius: 4px; border-left: 3px solid var(--agent-color, var(--text-muted)); }
.msg.system .msg-bubble { background: transparent; color: var(--text-muted); font-size: 12px; padding: 2px 0; text-align: center; }

/* Reactions */
.msg-reactions {
  display: flex; gap: 4px; margin-top: 4px; padding: 0 4px;
  flex-wrap: wrap;
}
.reaction-pill {
  display: flex; align-items: center; gap: 2px;
  padding: 1px 6px; border-radius: 10px;
  background: var(--surface3); font-size: 12px;
  cursor: pointer; transition: all 0.15s; border: 1px solid transparent;
}
.reaction-pill:hover { border-color: var(--primary); transform: scale(1.1); }
.reaction-pill .count { font-size: 10px; color: var(--text-dim); }

/* Reaction picker */
.reaction-picker {
  display: none; position: absolute; bottom: 100%; left: 0;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 4px; gap: 2px; z-index: 50;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
}
.reaction-picker.show { display: flex; }
.reaction-picker button {
  width: 28px; height: 28px; border: none; background: none;
  font-size: 16px; cursor: pointer; border-radius: 6px;
  transition: background 0.1s;
}
.reaction-picker button:hover { background: var(--surface3); }

/* ===== Scroll-to-bottom button ===== */
#scrollBtn {
  display: none; position: fixed; bottom: 72px; left: 50%;
  transform: translateX(-50%);
  background: var(--primary); color: #fff; border: none;
  border-radius: 20px; padding: 6px 16px;
  font-size: 13px; cursor: pointer; z-index: 200;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  animation: fadeIn 0.2s;
}
#scrollBtn .badge { background: rgba(255,255,255,0.3); border-radius: 8px; padding: 1px 6px; margin-left: 4px; font-size: 11px; }

/* ===== Input ===== */
.input-area {
  padding: 8px 12px; padding-bottom: max(8px, env(safe-area-inset-bottom));
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
}
.input-area input {
  flex: 1; padding: 10px 16px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color 0.15s;
}
.input-area input:focus { border-color: var(--primary); }
.input-area input::placeholder { color: var(--text-muted); }
.send-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: var(--primary); color: #fff; font-size: 18px;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.send-btn:hover { background: #5f3dc4; transform: scale(1.05); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ===== Join Modal ===== */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); display: flex;
  align-items: center; justify-content: center; z-index: 100;
  backdrop-filter: blur(8px);
}
.modal {
  background: var(--surface); padding: 32px; border-radius: 20px;
  text-align: center; min-width: 300px; max-width: 400px;
  border: 1px solid var(--border);
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
}
.modal h2 { font-size: 22px; margin-bottom: 4px; }
.modal .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }
.modal input {
  width: 100%; padding: 12px 16px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text); font-size: 16px; margin-bottom: 16px; outline: none;
}
.modal input:focus { border-color: var(--primary); }
.modal .join-btn {
  width: 100%; padding: 12px; border-radius: 12px; border: none;
  background: var(--primary); color: #fff; font-size: 16px;
  font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.modal .join-btn:hover { background: #5f3dc4; }
.modal .status { color: var(--text-dim); font-size: 12px; margin-top: 10px; min-height: 18px; }

/* Agent preview in join modal */
.agent-preview {
  display: flex; gap: 12px; justify-content: center;
  margin: 20px 0; flex-wrap: wrap;
}
.agent-preview-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; font-size: 11px; color: var(--text-dim);
}
.agent-preview-item .avatar { font-size: 24px; }

/* ===== Search Panel ===== */
.search-panel {
  display: none; background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
}
.search-panel.show { display: flex; gap: 8px; align-items: center; }
.search-panel input {
  flex: 1; padding: 8px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 13px; outline: none;
}
.search-panel input:focus { border-color: var(--primary); }
.search-results {
  display: none; background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px; max-height: 200px; overflow-y: auto;
}
.search-results.show { display: block; }
.search-result-item { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; }
.search-result-item:last-child { border-bottom: none; }
.search-result-item .sr-name { font-weight: 600; font-size: 11px; }
.search-result-item .sr-text { color: var(--text-dim); margin-top: 2px; }
.search-result-item .sr-text mark { background: var(--primary); color: #fff; border-radius: 2px; padding: 0 2px; }
.search-no-result { color: var(--text-muted); text-align: center; padding: 16px; font-size: 13px; }

/* ===== Side Panel (archives) ===== */
.side-panel-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 150;
}
.side-panel-overlay.show { display: block; }
.side-panel {
  position: fixed; top: 0; right: -360px; width: 340px; height: 100%;
  background: var(--surface); border-left: 1px solid var(--border);
  z-index: 160; transition: right 0.25s ease;
  display: flex; flex-direction: column;
}
.side-panel.open { right: 0; }
.side-panel-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.side-panel-header h3 { font-size: 16px; }
.side-panel-body { flex: 1; overflow-y: auto; padding: 12px; }

.archive-card {
  padding: 12px; background: var(--surface2); border-radius: 10px;
  margin-bottom: 8px; cursor: pointer; transition: background 0.15s;
}
.archive-card:hover { background: var(--surface3); }
.archive-card .ac-name { font-size: 14px; font-weight: 500; }
.archive-card .ac-meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.archive-card .ac-actions { display: flex; gap: 6px; margin-top: 8px; }
.archive-card .ac-btn {
  padding: 4px 10px; border-radius: 6px; border: none;
  font-size: 11px; cursor: pointer; font-weight: 500;
}
.ac-btn.load { background: var(--primary); color: #fff; }
.ac-btn.del { background: var(--danger); color: #fff; }

/* ===== Connection Status ===== */
.conn-badge {
  font-size: 9px; padding: 1px 6px; border-radius: 8px;
  background: var(--surface2); display: inline-flex; align-items: center; gap: 3px;
  white-space: nowrap;
}
.conn-badge .cdot { width: 5px; height: 5px; border-radius: 50%; }
.conn-badge.ok .cdot { background: var(--success); }
.conn-badge.err .cdot { background: var(--danger); }
.conn-badge.warn .cdot { background: var(--warning); }

/* ===== Notification Sound ===== */

/* ===== Animations ===== */
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } }
@keyframes fadeIn { from { opacity: 0; } }

/* ===== Mobile adjustments ===== */
@media (max-width: 480px) {
  .msg { max-width: 88%; }
  .agent-chip { font-size: 10px; padding: 2px 6px; }
  .header { padding: 8px 12px; }
  .icon-btn { width: 32px; height: 32px; font-size: 15px; }
  .header-actions { gap: 4px; }
  .header-title { font-size: 14px; }
}
</style>
</head>
<body>

<!-- Join Modal -->
<div class="modal-overlay" id="joinModal">
  <div class="modal">
    <h2>🤖 Multi-Agent Chat</h2>
    <p class="subtitle">输入名字加入聊天室</p>
    <div class="agent-preview" id="agentPreview"></div>
    <input type="text" id="nameInput" placeholder="你的名字" maxlength="20" autofocus>
    <button class="join-btn" onclick="join()">加入聊天</button>
    <div class="status" id="joinStatus"></div>
  </div>
</div>

<!-- Header -->
<div class="header" id="header" style="display:none;">
  <div class="header-left">
    <div>
      <div class="header-title">Multi-Agent Chat</div>
      <div class="header-subtitle">
        <span id="onlineInfo">连接中...</span>
        <span class="conn-badge ok" id="connBadge" title="连接状态"><div class="cdot"></div><span id="connBadgeText">在线</span></span>
      </div>
    </div>
  </div>
  <div class="agents-strip" id="agentsStrip"></div>
  <div class="header-actions">
    <button class="icon-btn" onclick="toggleSearch()" title="搜索">🔍</button>
    <button class="icon-btn" onclick="clearChat()" title="清空聊天记录 (不保存)">🗑️</button>
    <button class="icon-btn" onclick="toggleSidePanel()" title="存档">📂</button>
  </div>
</div>

<!-- Search Panel -->
<div class="search-panel" id="searchPanel">
  <input type="text" id="searchInput" placeholder="搜索消息..." autocomplete="off">
  <button class="icon-btn" onclick="closeSearch()">✕</button>
</div>
<div class="search-results" id="searchResults"></div>

<!-- Typing Bar -->
<div class="typing-bar" id="typingBar"></div>

<!-- Messages -->
<div class="messages" id="messages"></div>

<!-- Scroll Button -->
<button id="scrollBtn" onclick="scrollToBottom()">⬇ 新消息</button>

<!-- Input -->
<div class="input-area" id="inputArea" style="display:none;">
  <input type="text" id="msgInput" placeholder="说点什么..." autocomplete="off">
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
</div>

<!-- Side Panel -->
<div class="side-panel-overlay" id="sideOverlay" onclick="toggleSidePanel()"></div>
<div class="side-panel" id="sidePanel">
  <div class="side-panel-header">
    <h3>📂 聊天存档</h3>
    <button class="icon-btn" onclick="toggleSidePanel()">✕</button>
  </div>
  <div class="side-panel-body" id="archiveList">
    <div class="search-no-result">加载中...</div>
  </div>
</div>

<!-- Audio for notification -->
<audio id="notifSound" preload="auto">
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
</audio>

<script>
// ===== State =====
let ws, userName = '', msgCount = 0;
let agentColors = {}, agentAvatars = {}, agentNames = {};
let userScrolledUp = false, unreadCount = 0;
let activeReactionPicker = null;
let typingAgents = {};
let searchTimeout = null;

const msgDiv = document.getElementById('messages');
const savedName = localStorage.getItem('mac-name');

if (savedName) document.getElementById('nameInput').value = savedName;

// ===== Audio notification =====
function playNotif() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 800; osc.type = 'sine';
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

// ===== Init =====
async function init() {
  try {
    const r = await fetch('/api/agents');
    const data = await r.json();
    const preview = document.getElementById('agentPreview');
    preview.innerHTML = data.agents.map(a => {
      agentColors[a.id] = a.color;
      agentAvatars[a.id] = a.avatar;
      agentNames[a.id] = a.name;
      return `<div class="agent-preview-item"><div class="avatar">${a.avatar}</div><div>${a.name}</div></div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

function join() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').style.borderColor = 'var(--danger)'; return; }
  userName = name;
  localStorage.setItem('mac-name', name);
  document.getElementById('joinModal').style.display = 'none';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('inputArea').style.display = 'flex';
  document.getElementById('msgInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  connectWS();
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', name: userName }));
    document.getElementById('msgInput').focus();
    updateConn('ok', '在线');
    loadAgentStrip();
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    switch(data.type) {
      case 'history':
        msgDiv.innerHTML = '';
        msgCount = data.messages.length;
        data.messages.forEach(m => addMsg(m, false));
        scrollToBottom();
        break;
      case 'message':
        msgCount++;
        addMsg(data, true);
        if (data.role !== 'user' && data.role !== 'system') {
          clearTyping(data.role);
        }
        break;
      case 'system':
        addSystemMsg(data.content);
        break;
      case 'cleared':
        msgDiv.innerHTML = '';
        msgCount = 0;
        addSystemMsg('✅ ' + data.content);
        break;
      case 'typing':
        handleTyping(data);
        break;
      case 'reaction':
        updateReaction(data);
        break;
      case 'agent_status':
        // Initial agent statuses
        data.agents.forEach(a => {
          updateAgentChip(a.id, a.online);
        });
        break;
    }
  };

  ws.onclose = () => {
    updateConn('err', '断开');
    addSystemMsg('⚠️ 连接断开，3秒后重连...');
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {};
}

// ===== Agent Strip =====
async function loadAgentStrip() {
  try {
    const r = await fetch('/api/agents');
    const data = await r.json();
    const strip = document.getElementById('agentsStrip');
    strip.innerHTML = data.agents.map(a => `
      <div class="agent-chip ${a.online ? 'online' : 'offline'}" id="chip-${a.id}">
        <span class="avatar">${a.avatar}</span>
        <span>${a.name}</span>
        <span class="dot"></span>
      </div>
    `).join('');
    updateOnlineInfo(data.agents);
  } catch(e) {}
}

function updateAgentChip(agentId, online) {
  const chip = document.getElementById(`chip-${agentId}`);
  if (chip) chip.className = `agent-chip ${online ? 'online' : 'offline'}`;
}

function updateOnlineInfo(agents) {
  const online = agents.filter(a => a.online).length;
  document.getElementById('onlineInfo').textContent = `${agents.length} 个角色 · ${online} 在线`;
}

// ===== Connection Status =====
function updateConn(status, text) {
  const el = document.getElementById('connBadge');
  el.className = `conn-badge ${status}`;
  // 2026-06-13: 不要 innerHTML 覆盖 (会丢 .cdot 子节点), 改用 querySelector 找/建子节点
  let cdot = el.querySelector('.cdot');
  if (!cdot) cdot = document.createElement('div'), cdot.className = 'cdot', el.insertBefore(cdot, el.firstChild);
  let label = el.querySelector('span');
  if (!label) label = document.createElement('span'), el.appendChild(label);
  label.textContent = text;
}

// ===== Clear Chat (本地清空, 不保存到服务器) =====
function clearChat() {
  if (!confirm('确认清空聊天记录吗?\n(本地聊天界面将清空, 不会保存到服务器)')) return;
  msgDiv.innerHTML = '';
  msgCount = 0;
  addSystemMsg('🗑️ 已清空聊天记录 (不保存到服务器)');
  scrollToBottom();
}

// ===== Messages =====
function addMsg(msg, isNew = true) {
  const el = document.createElement('div');
  const isMe = msg.role === 'user' && msg.from === userName;
  const color = agentColors[msg.role] || '#636e72';
  const avatar = agentAvatars[msg.role] || msg.avatar || '';
  const time = msg.time ? new Date(msg.time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';

  if (msg.role === 'system') {
    el.className = 'msg system';
    el.innerHTML = `<div class="msg-bubble">${esc(msg.content || '')}</div>`;
  } else if (isMe) {
    el.className = 'msg user';
    el.innerHTML = `
      <div class="msg-header"><span class="msg-name">我</span><span class="msg-time">${time}</span></div>
      <div class="msg-bubble">${esc(msg.content)}</div>
      <div class="msg-reactions" id="reactions-${msg.id}"></div>
    `;
  } else {
    el.className = 'msg agent';
    el.style.setProperty('--agent-color', color);
    el.innerHTML = `
      <div class="msg-header">
        <span class="msg-avatar">${avatar}</span>
        <span class="msg-name" style="color:${color}">${esc(msg.from)}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-bubble">${esc(msg.content)}</div>
      <div class="msg-reactions" id="reactions-${msg.id}"></div>
      <div class="reaction-picker" id="picker-${msg.id}">
        ${['👍','❤️','😂','🤔','😮','🔥'].map(e => `<button onclick="sendReaction(${msg.id},'${e}')">${e}</button>`).join('')}
      </div>
    `;
    // Click to show reactions on agent messages
    el.querySelector('.msg-bubble').addEventListener('dblclick', (ev) => {
      ev.stopPropagation();
      togglePicker(msg.id);
    });
    // Long press for mobile
    let pressTimer;
    el.querySelector('.msg-bubble').addEventListener('touchstart', () => {
      pressTimer = setTimeout(() => togglePicker(msg.id), 500);
    });
    el.querySelector('.msg-bubble').addEventListener('touchend', () => clearTimeout(pressTimer));
  }

  // Render existing reactions
  if (msg.reactions && msg.reactions.length > 0) {
    setTimeout(() => renderReactions(msg.id, msg.reactions), 0);
  }

  msgDiv.appendChild(el);
  
  if (isNew) {
    const atBottom = msgDiv.scrollHeight - msgDiv.scrollTop - msgDiv.clientHeight < 100;
    if (atBottom || isMe) {
      scrollToBottom();
    } else {
      userScrolledUp = true;
      unreadCount++;
      showScrollBtn();
      // Play notification for non-user messages
      if (!isMe) playNotif();
    }
  }
}

function addSystemMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg system';
  el.innerHTML = `<div class="msg-bubble">${esc(text)}</div>`;
  msgDiv.appendChild(el);
  scrollToBottom();
}

// ===== Reactions =====
function togglePicker(msgId) {
  if (activeReactionPicker) {
    const old = document.getElementById(`picker-${activeReactionPicker}`);
    if (old) old.classList.remove('show');
  }
  if (activeReactionPicker === msgId) {
    activeReactionPicker = null;
    return;
  }
  const picker = document.getElementById(`picker-${msgId}`);
  if (picker) { picker.classList.add('show'); activeReactionPicker = msgId; }
}

function sendReaction(msgId, emoji) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'react', msgId, emoji }));
  }
  togglePicker(msgId); // close picker
}

function updateReaction(data) {
  renderReactions(data.msgId, data.reactions);
}

function renderReactions(msgId, reactionList) {
  const container = document.getElementById(`reactions-${msgId}`);
  if (!container) return;
  
  // Group by emoji
  const grouped = {};
  reactionList.forEach(r => {
    if (!grouped[r.emoji]) grouped[r.emoji] = 0;
    grouped[r.emoji]++;
  });
  
  container.innerHTML = Object.entries(grouped).map(([emoji, count]) =>
    `<span class="reaction-pill" onclick="sendReaction(${msgId},'${emoji}')">${emoji}${count > 1 ? `<span class="count">${count}</span>` : ''}</span>`
  ).join('');
}

// Close picker on outside click
document.addEventListener('click', () => {
  if (activeReactionPicker) {
    const picker = document.getElementById(`picker-${activeReactionPicker}`);
    if (picker) picker.classList.remove('show');
    activeReactionPicker = null;
  }
});

// ===== Typing Indicator =====
function handleTyping(data) {
  const bar = document.getElementById('typingBar');
  
  if (data.isTyping && data.agentId) {
    typingAgents[data.agentId] = { name: data.agentName, avatar: data.avatar, time: Date.now() };
  } else if (data.agentId) {
    delete typingAgents[data.agentId];
  }
  
  const agents = Object.values(typingAgents);
  if (agents.length === 0) {
    bar.className = 'typing-bar';
    bar.innerHTML = '';
    return;
  }
  
  bar.className = 'typing-bar active';
  const names = agents.map(a => `${a.avatar} ${a.name}`).join(', ');
  bar.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>${names} 正在输入...`;
}

function clearTyping(agentId) {
  delete typingAgents[agentId];
  handleTyping({});
}

// ===== User Typing (send to server) =====
let lastTypingSent = 0;
document.getElementById('msgInput').addEventListener('input', () => {
  if (ws && ws.readyState === 1 && Date.now() - lastTypingSent > 2000) {
    ws.send(JSON.stringify({ type: 'typing', isTyping: true }));
    lastTypingSent = Date.now();
  }
});

// ===== Search =====
function toggleSearch() {
  const panel = document.getElementById('searchPanel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) {
    document.getElementById('searchInput').focus();
  } else {
    closeSearch();
  }
}

function closeSearch() {
  document.getElementById('searchPanel').classList.remove('show');
  document.getElementById('searchResults').classList.remove('show');
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();
  if (q.length < 2) {
    document.getElementById('searchResults').classList.remove('show');
    return;
  }
  searchTimeout = setTimeout(() => doSearch(q), 300);
});

async function doSearch(q) {
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    const container = document.getElementById('searchResults');
    
    if (data.results.length === 0) {
      container.innerHTML = '<div class="search-no-result">没有找到相关消息</div>';
    } else {
      const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      container.innerHTML = data.results.map(m => {
        const highlighted = esc(m.content).replace(re, '<mark>$1</mark>');
        return `<div class="search-result-item" onclick="jumpToMsg(${m.id})">
          <div class="sr-name">${esc(m.from)}</div>
          <div class="sr-text">${highlighted}</div>
        </div>`;
      }).join('');
    }
    container.classList.add('show');
  } catch(e) {}
}

function jumpToMsg(msgId) {
  closeSearch();
  // Find message element by reactions container id
  const el = document.getElementById(`reactions-${msgId}`);
  if (el) {
    el.parentElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.parentElement.style.transition = 'background 0.3s';
    el.parentElement.style.background = 'rgba(108,92,231,0.2)';
    setTimeout(() => { el.parentElement.style.background = ''; }, 1500);
  }
}

// ===== Scroll =====
msgDiv.addEventListener('scroll', () => {
  const atBottom = msgDiv.scrollHeight - msgDiv.scrollTop - msgDiv.clientHeight < 100;
  userScrolledUp = !atBottom;
  if (atBottom) hideScrollBtn();
});

function scrollToBottom() {
  msgDiv.scrollTop = msgDiv.scrollHeight;
  userScrolledUp = false;
  hideScrollBtn();
}

function showScrollBtn() {
  const btn = document.getElementById('scrollBtn');
  btn.style.display = 'block';
  btn.innerHTML = unreadCount > 0 ? `⬇ 新消息<span class="badge">${unreadCount}</span>` : '⬇ 底部';
}

function hideScrollBtn() {
  document.getElementById('scrollBtn').style.display = 'none';
  unreadCount = 0;
}

// ===== Send Message =====
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'message', content: text }));
  input.value = '';
  input.focus();
  // Stop typing
  ws.send(JSON.stringify({ type: 'typing', isTyping: false }));
}

// ===== Side Panel (Archives) =====
async function toggleSidePanel() {
  const panel = document.getElementById('sidePanel');
  const overlay = document.getElementById('sideOverlay');
  const isOpen = panel.classList.contains('open');
  
  if (isOpen) {
    panel.classList.remove('open');
    overlay.classList.remove('show');
  } else {
    panel.classList.add('open');
    overlay.classList.add('show');
    await loadArchives();
  }
}

async function loadArchives() {
  try {
    const r = await fetch('/api/archives');
    const data = await r.json();
    const list = document.getElementById('archiveList');
    
    if (!data.archives || data.archives.length === 0) {
      list.innerHTML = '<div class="search-no-result">还没有聊天存档</div>';
    } else {
      list.innerHTML = data.archives.map(a => {
        const date = new Date(a.exportTime).toLocaleString('zh-CN');
        return `<div class="archive-card">
          <div class="ac-name">${esc(a.name)}</div>
          <div class="ac-meta">${a.messageCount} 条 · ${date}</div>
          <div class="ac-actions">
            <button class="ac-btn load" onclick="doImport('${a.filename}')">加载</button>
            <button class="ac-btn del" onclick="doDelete('${a.filename}')">删除</button>
          </div>
        </div>`;
      }).join('');
    }
  } catch(e) {}
}

async function doImport(filename) {
  try {
    const r = await fetch('/api/import', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ filename }) });
    const data = await r.json();
    if (data.ok) {
      msgDiv.innerHTML = '';
      msgCount = data.messages.length;
      data.messages.forEach(m => addMsg(m, false));
      scrollToBottom();
      toggleSidePanel();
    } else alert(data.error);
  } catch(e) {}
}

async function doDelete(filename) {
  if (!confirm('确定删除？')) return;
  await fetch('/api/archive/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ filename }) });
  loadArchives();
}

// ===== Utilities =====
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// ===== Keyboard Shortcuts =====
document.getElementById('msgInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') join(); });
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });

// Global ESC
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeSearch();
    if (document.getElementById('sidePanel').classList.contains('open')) toggleSidePanel();
  }
});

// Ctrl+K for search
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    toggleSearch();
  }
});

// ===== Boot =====
init();
</script>
</body>
</html>
