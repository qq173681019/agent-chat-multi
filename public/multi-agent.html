<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🤖 Multi-Agent Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 12px 16px; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 16px; color: #fff; }
.header .agents-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.agent-badge { display: flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: 12px; background: rgba(255,255,255,0.1); }
.agent-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
.agent-badge.online .dot { background: #00b894; }
.agent-badge.offline .dot { background: #636e72; }

/* Online panel */
.online-panel { background: #111; padding: 6px 16px; border-bottom: 1px solid #222; font-size: 12px; color: #888; display: flex; align-items: center; gap: 8px; overflow-x: auto; }
.online-panel .tag { white-space: nowrap; }

/* Messages */
.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; position: relative; }
.msg.user { align-self: flex-end; background: #2d3436; border-bottom-right-radius: 4px; }
.msg.user .msg-name { color: #dfe6e9; font-weight: 600; font-size: 12px; margin-bottom: 2px; }
.msg.agent { align-self: flex-start; border-bottom-left-radius: 4px; }
.msg .msg-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.msg .msg-avatar { font-size: 18px; }
.msg .msg-name { font-weight: 600; font-size: 12px; }
.msg .msg-content { color: #dfe6e9; }
.msg.system { align-self: center; background: transparent; color: #636e72; font-size: 12px; padding: 4px 0; text-align: center; }

/* Input */
.input-area { padding: 12px 16px; border-top: 1px solid #333; background: #111; display: flex; gap: 8px; align-items: center; }
.input-area input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; outline: none; }
.input-area input:focus { border-color: #6c5ce7; }
.input-area button { padding: 10px 20px; border-radius: 20px; border: none; background: #6c5ce7; color: #fff; font-size: 14px; cursor: pointer; }
.input-area button:hover { background: #5f3dc4; }

/* Join modal */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #1a1a2e; padding: 32px; border-radius: 16px; text-align: center; min-width: 300px; }
.modal h2 { color: #fff; margin-bottom: 16px; }
.modal input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #0a0a0a; color: #fff; font-size: 16px; margin-bottom: 12px; outline: none; }
.modal button { padding: 12px 32px; border-radius: 8px; border: none; background: #6c5ce7; color: #fff; font-size: 16px; cursor: pointer; }

/* Scrollbar */
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

/* Loading */
.loading { text-align: center; color: #636e72; padding: 20px; }
</style>
</head>
<body>

<!-- Join Modal -->
<div class="modal-overlay" id="joinModal">
  <div class="modal">
    <h2>🤖 Multi-Agent Chat</h2>
    <p style="color:#888;margin-bottom:16px;font-size:14px;">输入你的名字加入聊天</p>
    <input type="text" id="nameInput" placeholder="你的名字" maxlength="20" autofocus>
    <button onclick="join()">加入聊天</button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <h1>🤖 Multi-Agent Chat</h1>
  <div class="agents-bar" id="agentsBar"></div>
</div>

<!-- Online -->
<div class="online-panel" id="onlinePanel">
  <span>在线:</span>
</div>

<!-- Messages -->
<div class="messages" id="messages"></div>

<!-- Input -->
<div class="input-area">
  <input type="text" id="msgInput" placeholder="说点什么..." disabled>
  <button onclick="sendMsg()" id="sendBtn" disabled>发送</button>
</div>

<script>
const SERVER = location.protocol === 'https:' ? '' : `ws://${location.host}`;
let ws, userName, agentColors = {};

// 获取 agent 颜色配置
async function loadAgents() {
  try {
    const r = await fetch('/api/agents');
    const data = await r.json();
    const bar = document.getElementById('agentsBar');
    bar.innerHTML = data.agents.map(a => {
      agentColors[a.id] = a.color;
      return `<div class="agent-badge online" id="badge-${a.id}">
        <span class="dot" style="background:${a.color}"></span>
        <span>${a.avatar} ${a.name}</span>
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

function join() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  userName = name;
  document.getElementById('joinModal').style.display = 'none';
  document.getElementById('msgInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  connectWS();
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', name: userName }));
    document.getElementById('msgInput').focus();
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'history') {
      data.messages.forEach(m => addMessage(m, false));
      scrollToBottom();
    } else if (data.type === 'message') {
      addMessage(data);
    } else if (data.type === 'system') {
      addSystemMsg(data.content);
    } else if (data.type === 'cleared') {
      document.getElementById('messages').innerHTML = '';
      addSystemMsg(data.content);
    }
  };
  ws.onclose = () => {
    addSystemMsg('连接断开，3秒后重连...');
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => {};
}

function addMessage(msg, scroll = true) {
  const div = document.getElementById('messages');
  const el = document.createElement('div');
  
  const color = agentColors[msg.role] || '#636e72';
  
  if (msg.role === 'user') {
    el.className = 'msg user';
    el.innerHTML = `<div class="msg-name">${esc(msg.from)}</div><div class="msg-content">${esc(msg.content)}</div>`;
  } else if (msg.role === 'system') {
    el.className = 'msg system';
    el.textContent = msg.content;
  } else {
    el.className = 'msg agent';
    el.style.background = hexToRgba(color, 0.15);
    el.style.borderLeft = `3px solid ${color}`;
    const avatar = msg.avatar || '🤖';
    el.innerHTML = `<div class="msg-header"><span class="msg-avatar">${avatar}</span><span class="msg-name" style="color:${color}">${esc(msg.from)}</span></div><div class="msg-content">${esc(msg.content)}</div>`;
  }
  
  div.appendChild(el);
  if (scroll) scrollToBottom();
}

function addSystemMsg(text) {
  const div = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg system';
  el.textContent = text;
  div.appendChild(el);
  scrollToBottom();
}

function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !ws) return;
  ws.send(JSON.stringify({ type: 'message', content: text }));
  input.value = '';
}

function scrollToBottom() {
  const div = document.getElementById('messages');
  div.scrollTop = div.scrollHeight;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Enter to send
document.getElementById('msgInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMsg();
});
document.getElementById('nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') join();
});

loadAgents();
</script>
</body>
</html>
